name: Docker Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sonal-app:latest .

      - name: Show Docker images
        run: docker images

      - name: Test Docker image
        run: docker run sonal-app:latest
