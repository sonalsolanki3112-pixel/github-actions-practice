name: Full CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sonal-app:latest .

      - name: Show Docker images
        run: docker images

  summary:
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - name: Pipeline Summary
        run: |
          echo "Tests passed!"
          echo "Docker image built!"
          echo "Full pipeline complete!"
          echo "Sonal DevOps Pipeline is working!"
